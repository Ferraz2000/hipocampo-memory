# brain.config.toml — hipocampo per-project configuration
#
# Copy to `brain.config.toml` at your repo root and edit. Every hipocampo script
# reads from here; nothing project-specific is hardcoded. Anything you omit
# falls back to the defaults shown below (these defaults live in
# hipocampo/config.py — keep the two in sync).
#
# Read with: hipocampo.config.load_config()  (walks up from cwd to find this file)

# Where the vault lives, relative to the repo root. Neutral default; set to
# "docs/obsidian" if you open it as an Obsidian vault, or anything you like.
vault_root = "docs/brain"

# Language of scaffolded vault content and capture prompts ("en", "pt-BR", ...).
# Drives which locale the generator skills emit; does not affect script logic.
language = "en"

# Interview answers recorded by /brain-init (read by the other generator skills).
project_mode = "existing"   # "existing" | "greenfield"
team = false                # true → PR-workflow rules + protected-branch suggestion

# Base branch for the git-derived session briefing (SessionStart hook) and for
# doc-sync diff ranges.
base_branch = "main"

# Subdirectories. inbox/insights/raw_sources/generated/knowledge are relative to
# vault_root; cache is relative to the repo root (it's disposable, gitignored).
[dirs]
knowledge   = "knowledge"
inbox       = "knowledge/_inbox"
insights    = "insights"
raw_sources = "raw/sources"
generated   = "_generated"
cache       = ".brain-cache"

# Closed vocabulary for knowledge/insight `area:` frontmatter. Tune per project.
areas = ["meta", "architecture", "product", "testing"]

# Closed vocabulary for insight `status:` frontmatter (frontmatter-as-truth).
statuses = [
  "triage", "active", "deferred",
  "implemented", "closed", "rejected", "superseded", "promoted",
]

# Roadmap work states (the "is this actively queued" set) and the statuses that
# mean an item is done/dead (used to detect roadmap/insight drift).
active_states     = ["ready", "in-progress"]
inactive_statuses = ["rejected", "closed", "discarded", "superseded", "implemented"]

# Optional: map common misspellings/aliases to a canonical area (drift fixer).
# Example: { tech = "technical", arch = "architecture" }
[area_aliases]

# Where persona/preference captures land (and what the capture-sweep points at).
# Claude Code auto-loads `.claude/rules/USER.md` every session; Codex/Gemini have
# no path-auto-load, so set this to a file your AGENTS.md router references
# (e.g. "docs/brain/USER.md") so it's pulled in cross-agent.
[memory]
persona_file = ".claude/rules/USER.md"

# Inbox decay: auto-sweeps of this `type:` older than decay_days, still in triage
# and not pinned, are expired. Markdown stays the source of truth; only the
# kit's own ephemeral sweeps are ever removed.
[inbox]
decay_days = 30
sweep_type = "capture-sweep"

# Search (BM25, and the optional FTS5 index): which vault subdirs to scan, and
# which terminal statuses to hide from default results (--all overrides).
[search]
dirs = ["knowledge", "insights", "specs", "raw/sources"]
hidden_statuses = ["closed", "implemented", "rejected", "superseded", "deferred"]

# Phrases that should trigger a proactive "capture this?" offer in chat. The
# write-gate still applies — the agent offers, the human approves.
capture_triggers = [
  "decided", "decision is", "from now on", "always", "rule of thumb",
  "lesson learned", "trade-off", "anti-pattern", "canonical",
]
# Triggers that count only in AGENT messages (pattern declarations), kept apart
# to cut noise from the agent's own narration.
capture_agent_triggers = ["anti-pattern", "canonical", "consolidated pattern"]
# Hosts treated as internal — URLs containing these are not swept as sources.
capture_internal_hosts = ["localhost", "127.0.0.1"]
# Phrases meaning the user already triggered capture this session (sweep skips them).
capture_verbs = ["/capture", "registra isso", "save to the brain"]

# Dirs doc_links never descends into (.git, __pycache__, and the cache dir are
# always excluded on top of these).
doc_links_exclude_dirs = ["coverage", "node_modules", "bin", "obj", ".venv", "dist", "build", "target", "vendor"]

# Required docs (routing contract): these must exist, or doc_links fails.
required_docs = []

# Validators run by preflight, in order. Each entry is a module under
# hipocampo/validators/.
validators = ["doc_links", "feature_doc_sync", "vault_sync"]

# How hard each gate point pushes back when a check fails. The git hooks and CI
# call `hipocampo.gate`, which reads this (validators always report truthfully).
# Per point: "block" = fail the operation; "warn" = print findings but don't
# block; "off" = skip. Defaults keep the historical blocking behavior. A good
# low-friction setup is warn locally + block in CI (you're never stuck mid-task,
# but drift still can't merge):
#   [enforcement]
#   pre_commit = "warn"
#   pre_push   = "warn"
#   ci         = "block"
[enforcement]
pre_commit = "block"   # doc-sync gate on `git commit`
pre_push   = "block"   # preflight on `git push`
ci         = "block"   # preflight in CI (keep strict as the backstop)

# A changed file matching any of these globs (e.g. a Doc Impact Report) satisfies
# every doc_sync rule for that commit.
doc_sync_escape_globs = ["**/doc-impact-reports/**/*.md"]

# Router lint (opt-in: add "router_lint" to validators above). Keeps AGENTS.md
# lean — long, vague instruction files measurably tax agent reasoning.
[router]
file = "AGENTS.md"
max_lines = 120

# Doc-sync rules (Phase 3): when a commit stages a file matching `paths`, it must
# also stage at least one doc matching `docs` in the same commit, or the commit
# is blocked. This is the "behavior change must update its doc" gate.
#
# Replaces the origin project's hardcoded AREA_RULES. Add one table per rule:
#
# [[doc_sync]]
# name  = "public-contract"
# paths = ["src/contracts/**"]
# docs  = ["docs/architecture/contracts.md"]
#
# [[doc_sync]]
# name  = "persistence"
# paths = ["src/**/migrations/**", "src/**/repositories/**"]
# docs  = ["docs/architecture/persistence.md"]

# Materialized views (python -m hipocampo.views): which vault-relative dir feeds
# the dataview queries, and the header label for the note-link column.
# Opt-in freshness gate: add "views_fresh" to validators above.
[views]
notes_root = "insights"
id_label = "Note"

# Curated catalogs (opt-in: add "catalog_sync" to validators). Skills bundles
# must match the catalog doc; required instruction files (subtree AGENTS.md
# contract) must exist and stay concise (router file's cap is router_lint's job).
[catalog]
skills_dirs = []
catalog_doc = ""
required_files = []
required_files_max_lines = 80
