name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unittest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.11 is the floor (tomllib in stdlib); test the supported range.
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run tests (stdlib unittest, zero deps)
        run: python -m unittest discover -s hipocampo/tests -v

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Stdlib line coverage (zero-dep, trace-based)
        # Floor set with headroom: `trace` undercounts def/class lines (they run
        # at import, before tracing) and the [semantic] tier isn't installed here.
        run: python -m hipocampo.tests.coverage_report --fail-under 45

  manifests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate plugin manifests (JSON parses; version is single-sourced)
        run: |
          python - <<'PY'
          import json
          pj = json.load(open(".claude-plugin/plugin.json"))
          mk = json.load(open(".claude-plugin/marketplace.json"))
          entry = mk["plugins"][0]
          assert pj.get("name") == "hipocampo", "plugin.json name must be 'hipocampo'"
          assert "version" in pj, "plugin.json must carry the version"
          # plugin.json's version wins silently, so a marketplace-entry version would
          # mask drift — keep it in exactly one place.
          assert "version" not in entry, \
              "do not duplicate 'version' in the marketplace entry (plugin.json wins)"
          assert entry.get("source") == ".", \
              "same-repo plugin must use the relative source '.'"
          print("manifests OK — version", pj["version"])
          PY
      - name: Guard release sync (version ↔ CHANGELOG ↔ READMEs)
        run: python -m hipocampo.release check
