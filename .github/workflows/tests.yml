name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unittest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"   # lowest supported (tomllib in stdlib)
      - name: Run tests (stdlib unittest, zero deps)
        run: python -m unittest discover -s hipocampo/tests -v
